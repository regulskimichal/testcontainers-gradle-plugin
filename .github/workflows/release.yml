name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract Tag Version
        id: get_version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Release Artifacts
        run: |
          chmod +x gradlew
          ./gradlew build "-Pversion=${{ steps.get_version.outputs.version }}"

      - name: Publish to Gradle Plugin Portal (Optional)
        if: github.actor != 'nektos/act' && env.GRADLE_PUBLISH_KEY != '' && env.GRADLE_PUBLISH_SECRET != ''
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          chmod +x gradlew
          ./gradlew publishPlugins "-Pversion=${{ steps.get_version.outputs.version }}" --no-configuration-cache

      - name: Create GitHub Release
        if: github.actor != 'nektos/act'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag }}
          name: Release ${{ steps.get_version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.get_version.outputs.tag, '-') }}
          files: |
            build/libs/*.jar
          generate_release_notes: true

