name: Publish Plugin to Gradle Portal

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag version to publish (e.g. v0.1.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    name: Publish to Gradle Plugin Portal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Extract Version
        id: get_version
        run: |
          RAW_TAG="${{ inputs.tag }}"
          VERSION=${RAW_TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Publish to Gradle Plugin Portal
        if: ${{ !env.ACT }}
        env:
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: |
          chmod +x gradlew
          ./gradlew publishPlugins "-Pversion=${{ steps.get_version.outputs.version }}" --no-configuration-cache

      - name: Dry Run (act detected)
        if: ${{ env.ACT }}
        run: |
          chmod +x gradlew
          ./gradlew publishPlugins "-Pversion=${{ steps.get_version.outputs.version }}" --dry-run --no-configuration-cache
